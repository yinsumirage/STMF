# Default STMF datasets for temporal training/evaluation.
# Paths are repo-relative so the local checkout works out of the box.

HO3D-TRAIN:
  TYPE: TemporalImageDataset
  DATASET_FILE: _DATA/HO-3D_v3/ho3d_train.npz
  IMG_DIR: _DATA/HO-3D_v3/
  WEIGHT: 1.0

HO3D-VAL:
  TYPE: TemporalImageDataset
  DATASET_FILE: _DATA/hamer_evaluation_data/ho3d_val.npz
  IMG_DIR: _DATA/HO-3D_v3/evaluation
  WEIGHT: 1.0

# Enable these once InterHand2.6M 30fps has been exported with
