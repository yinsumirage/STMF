# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - data: mix_all.yaml
  #- trainer: ddp.yaml
  - paths: default.yaml
  - extras: default.yaml
  - hydra: default.yaml

  # experiment configs allow for version control of specific hyperparameters
  # e.g. best hyperparameters for given model and datamodule
  - experiment: null
  - texture_exp: null

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional launcher: local.yaml
  # - optional launcher: slurm.yaml

  # debugging config (enable through command line, e.g. `python train.py debug=default)
  - debug: null

# task name controls the top-level logging bucket, e.g. logs/train/runs/...
# Keep this broad; specific experiment names should come from `exp_name`.
task_name: "hamer"

# tags to help you identify your experiments
# you can overwrite this in experiment configs
# overwrite from command line with `python train.py tags="[first_tag, second_tag]"`
# appending lists from command line is currently not supported :(
# https://github.com/facebookresearch/hydra/issues/1547
tags: ["dev"]

# set False to skip model training
train: True

# simply provide checkpoint path to resume training
ckpt_path: null

# seed for random number generators in pytorch, numpy and python.random
seed: null

# Training Parameters
epochs: 20
max_steps: null
batch_size: null  # 64
num_workers: 4
prefetch_factor: null
lr: null
weight_decay: null
log_steps: null
precision: 32
limit_train_batches: 1.0
limit_val_batches: 0
limit_test_batches: 1.0
log_every_n_steps: 10
checkpoint: null
dataset_config_name: datasets_tar.yaml
run_validation: False
num_sanity_val_steps: 0
log_lr: False
freeze_backbone: False
freeze_mano_head: False
freeze_mano_transformer: False
freeze_camera_head: False
freeze_shape_head: False

# GPU and Strategy
devices: [0, 1]
#device: 0
accelerator: gpu
strategy: ddp_find_unused_parameters_true
#strategy: auto

# Checkpoint Frequencies
checkpoint_step_frequency: 1000
checkpoint_epoch_frequency: null
checkpoint_save_top_k: -1

# Test after training
test: False

# Logging Parameters
# Fallback experiment name used only when no experiment config overrides it.
# Most real runs should get a more specific `exp_name` from `experiment=...`.
exp_name: default_run
run_version: null
